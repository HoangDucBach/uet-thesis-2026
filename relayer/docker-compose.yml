services:
  redis:
    image: redis:7-alpine
    container_name: relayer-redis
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes --maxmemory 512mb --maxmemory-policy noeviction
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    container_name: relayer-postgres
    ports:
      - '5432:5432'
    environment:
      POSTGRES_DB: ${DB_NAME:-relayer}
      POSTGRES_USER: ${DB_USER:-relayer}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-relayer}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${DB_USER:-relayer}']
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
volumes:
  redis_data:
  postgres_data:
